name: Update Publications

on:
  schedule:
    # Runs every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        # free-proxy is pinned to <1.1.0: scholarly 1.7.11 calls FreeProxy's
        # get_proxy_list() with no args when refreshing proxies mid-run, but
        # free-proxy >=1.1.0 made the `repeat` arg required-positional, which
        # made every proxy attempt crash. 1.0.6 keeps the no-arg signature.
        run: pip install "scholarly==1.7.11" "free-proxy==1.0.6"

      - name: Fetch Google Scholar publications
        run: python scripts/fetch_publications.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/publications.json
          git diff --staged --quiet || git commit -m "Update publications from Google Scholar"
          git push
